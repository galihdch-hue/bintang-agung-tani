publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  phosphor_flutter: ^2.1.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
